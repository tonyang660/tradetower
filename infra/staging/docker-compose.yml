services:
  postgres:
    image: postgres:16
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_platform
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: OrignalMath797POSTGRES
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  data-hub:
    build: ../../services/data-hub
    container_name: trading-data-hub
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - DATA_ROOT=/data
    volumes:
      - ./volumes/data-hub:/data
    ports:
      - "8101:8080"

  feature-factory:
    build: ../../services/feature-factory
    container_name: trading-feature-factory
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - DATA_HUB_BASE_URL=http://data-hub:8080
    ports:
      - "8102:8080"

  candidate-filter:
    build: ../../services/candidate-filter
    container_name: trading-candidate-filter
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - TRADE_GUARDIAN_BASE_URL=http://trade-guardian:8080
      - FEATURE_FACTORY_BASE_URL=http://feature-factory:8080
      - MAX_CANDIDATES=25
      - MIN_SCORE=40
    ports:
      - "8103:8080"

  brain-orchestrator:
    build:
      context: ../..
      dockerfile: services/brain-orchestrator/Dockerfile
    container_name: trading-brain-orchestrator
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - LLM_SERVICE_BASE_URL=http://llm-service:8080
      - ROLE_CONFIDENCE_THRESHOLD=70
    ports:
      - "8104:8080"

  trade-guardian:
    build: ../../services/trade-guardian
    container_name: trading-trade-guardian
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - MTM_AUTO_REFRESH_ENABLED=true
      - MTM_AUTO_REFRESH_INTERVAL_SECONDS=30
      - MTM_ACCOUNT_ID=1
    ports:
      - "8105:8080"

  risk-engine:
    build: ../../services/risk-engine
    container_name: trading-risk-engine
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - TRADE_GUARDIAN_BASE_URL=http://trade-guardian:8080
      - MAX_RISK_PCT=1.0
      - MAX_LEVERAGE=15.0
      - MIN_NOTIONAL_PCT_OF_MAX_DEPLOYABLE=1.0
    ports:
      - "8106:8080"

  paper-execution:
    build: ../../services/paper-execution
    container_name: trading-paper-execution
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - DATA_HUB_BASE_URL=http://data-hub:8080
      - TRADE_GUARDIAN_BASE_URL=http://trade-guardian:8080
      - LIMIT_FEE_PCT=0.02
      - MARKET_FEE_PCT=0.06
      - MARKET_SLIPPAGE_PCT=0.06
    ports:
      - "8107:8080"

  evaluator:
    build:
      context: ../..
      dockerfile: services/evaluator/Dockerfile
    container_name: trading-evaluator
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=trading_platform
      - POSTGRES_USER=trading
      - POSTGRES_PASSWORD=OrignalMath797POSTGRES
      - TRADE_GUARDIAN_BASE_URL=http://trade-guardian:8080
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ../../services/evaluator/db:/docker-entrypoint-initdb.d
    ports:
      - "8108:8080"

  scheduler:
    build:
      context: ../..
      dockerfile: services/scheduler/Dockerfile
    container_name: trading-scheduler
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - API_GATEWAY_BASE_URL=http://api-gateway:8080
      - DATA_HUB_BASE_URL=http://data-hub:8080
      - TRADE_GUARDIAN_BASE_URL=http://trade-guardian:8080
      - CANDIDATE_FILTER_BASE_URL=http://candidate-filter:8080
      - PAPER_EXECUTION_BASE_URL=http://paper-execution:8080
      - EVALUATOR_BASE_URL=http://evaluator:8080
      - SYMBOL_UNIVERSE_PATH=/app/config/symbol_universe.json
      - AUTO_LOOP_ENABLED=false
      - LOOP_INTERVAL_SECONDS=300
      - ACCOUNT_ID=1
      - MARK_TO_MARKET_BEFORE_EVALUATOR_INGEST=true
    ports:
      - "8109:8080"

  llm-service:
    build:
      context: ../..
      dockerfile: services/llm-service/Dockerfile
    container_name: trading-llm-service
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    ports:
      - "8110:8080"

  strategy-engine:
    build:
      context: ../..
      dockerfile: services/strategy-engine/Dockerfile
    container_name: trading-strategy-engine
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - FEATURE_FACTORY_BASE_URL=http://feature-factory:8080
      - STRICT_SCORE_THRESHOLD=75
    ports:
      - "8111:8080"

  dashboard-api:
    build:
      context: ../..
      dockerfile: services/dashboard-api/Dockerfile
    container_name: trading-dashboard-api
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    environment:
      - EVALUATOR_BASE_URL=http://evaluator:8080
      - SCHEDULER_BASE_URL=http://scheduler:8080
      - TRADE_GUARDIAN_BASE_URL=http://trade-guardian:8080
      - CANDIDATE_FILTER_BASE_URL=http://candidate-filter:8080
      - STRATEGY_ENGINE_BASE_URL=http://strategy-engine:8080
      - RISK_ENGINE_BASE_URL=http://risk-engine:8080
      - PAPER_EXECUTION_BASE_URL=http://paper-execution:8080
      - API_GATEWAY_BASE_URL=http://api-gateway:8080
      - DATA_HUB_BASE_URL=http://data-hub:8080
      - SYMBOL_UNIVERSE_PATH=/config/symbol_universe.json
    ports:
      - "8112:8080"
  dashboard-web:
    build:
      context: ../..
      dockerfile: apps/dashboard-web/Dockerfile
      args:
        VITE_DASHBOARD_API_BASE_URL: http://10.0.0.40:8112
    container_name: trading-dashboard-web
    restart: unless-stopped
    ports:
      - "8113:80"

  api-gateway:
    build: ../../services/api-gateway
    container_name: trading-api-gateway
    restart: unless-stopped
    env_file:
      - ../env/staging.env
    ports:
      - "8100:8080"
  